# Set YCQL and YSQL passwords
# Required variables:
#   _yugabyte_namespace: namespace where Yugabyte is deployed
#   _yugabyte_pod_prefix: pod name prefix (e.g., "yugabyte-yb" for oldNamingStyle: false)
# Optional variables:
#   _yugabyte_tserver_service: tserver service name (default: "yugabyte-yb-tservers")

- name: Copy YCQL script to cluster
  when: yugabyte_cql_auth_enabled
  kubernetes.core.k8s_cp:
    namespace: "{{ _yugabyte_namespace }}"
    pod: "{{ _yugabyte_pod_prefix }}-master-0"
    container: yb-master
    content: "{{ lookup('template', 'update-ycql-password.sh') }}"
    remote_path: /tmp/update-ycql-password.sh

- name: Set YCQL password
  when: yugabyte_cql_auth_enabled
  kubernetes.core.k8s_exec:
    namespace: "{{ _yugabyte_namespace }}"
    pod: "{{ _yugabyte_pod_prefix }}-master-0"
    container: yb-master
    command: sh /tmp/update-ycql-password.sh {{ yugabyte_password }}
  register: result
  failed_when: result.rc != 0 and result.rc != 2
  retries: 18
  delay: 5
  until: result is not failed

- name: Copy YSQL script to cluster
  kubernetes.core.k8s_cp:
    namespace: "{{ _yugabyte_namespace }}"
    pod: "{{ _yugabyte_pod_prefix }}-tserver-0"
    container: yb-tserver
    content: "{{ lookup('template', 'update-ysql-password.sh') }}"
    remote_path: /tmp/update-ysql-password.sh

- name: Set YSQL password
  kubernetes.core.k8s_exec:
    namespace: "{{ _yugabyte_namespace }}"
    pod: "{{ _yugabyte_pod_prefix }}-tserver-0"
    container: yb-tserver
    command: sh /tmp/update-ysql-password.sh {{ yugabyte_password }}
  register: result
  failed_when: result.rc != 0 and result.rc != 2
  retries: 18
  delay: 5
  until: result is not failed
